<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Summarizer — Local AI</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0e8;
    --ink: #1a1612;
    --accent: #c84b2f;
    --accent2: #2d6a4f;
    --muted: #9a8f82;
    --border: #d9d0c3;
    --surface: #ede8de;
    --white: #faf8f4;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'IBM Plex Mono', monospace;
    min-height: 100vh;
  }

  /* Subtle paper texture via noise */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.5;
  }

  .layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    min-height: 100vh;
    position: relative;
    z-index: 1;
  }

  /* Left panel */
  .left {
    padding: 48px 40px;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  /* Right panel */
  .right {
    padding: 48px 40px;
    display: flex;
    flex-direction: column;
    gap: 24px;
    background: var(--white);
  }

  /* Header */
  .header {
    margin-bottom: 8px;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 32px;
    letter-spacing: -1.5px;
    line-height: 1;
  }

  .logo-dot { color: var(--accent); }

  .tagline {
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
    letter-spacing: 0.5px;
  }

  /* Controls row */
  .controls {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  input[type="text"] {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    background: var(--white);
    border: 1px solid var(--border);
    color: var(--ink);
    padding: 8px 12px;
    border-radius: 2px;
    outline: none;
    transition: border-color 0.2s;
    min-width: 0;
  }
  input[type="text"]:focus { border-color: var(--accent); }

  /* Mode tabs */
  .modes {
    display: flex;
    border: 1px solid var(--border);
    border-radius: 2px;
    overflow: hidden;
    width: fit-content;
  }

  .mode-btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    padding: 7px 14px;
    background: transparent;
    border: none;
    border-right: 1px solid var(--border);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.3px;
  }
  .mode-btn:last-child { border-right: none; }
  .mode-btn.active { background: var(--accent); color: #fff; font-weight: 500; }
  .mode-btn:not(.active):hover { background: var(--surface); color: var(--ink); }

  /* Textarea */
  .textarea-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  textarea {
    flex: 1;
    min-height: 280px;
    width: 100%;
    background: var(--white);
    border: 1px solid var(--border);
    color: var(--ink);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    line-height: 1.7;
    padding: 16px;
    border-radius: 2px;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
  }
  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--muted); }

  .input-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .char-count { font-size: 11px; color: var(--muted); }

  .btn-run {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    padding: 10px 28px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 2px;
    cursor: pointer;
    letter-spacing: 0.3px;
    transition: all 0.15s;
  }
  .btn-run:hover { background: #b03f26; transform: translateY(-1px); }
  .btn-run:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; transform: none; }

  .btn-example {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    padding: 8px 14px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-example:hover { border-color: var(--muted); color: var(--ink); }

  /* Right panel — output */
  .output-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .output-label-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .thinking-dots {
    display: none;
    gap: 3px;
    align-items: center;
  }
  .thinking-dots.visible { display: flex; }
  .thinking-dots span {
    width: 5px; height: 5px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 1.2s infinite;
  }
  .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
  .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; }
    40% { transform: scale(1); opacity: 1; }
  }

  .btn-copy {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    padding: 4px 10px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-copy:hover { color: var(--ink); border-color: var(--muted); }

  .output-box {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 24px;
    min-height: 280px;
    font-size: 14px;
    line-height: 1.85;
    color: var(--ink);
    white-space: pre-wrap;
    word-break: break-word;
    position: relative;
    overflow-y: auto;
  }

  .output-box.streaming::after {
    content: '▊';
    color: var(--accent);
    animation: blink 0.6s infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  .placeholder-text {
    color: var(--muted);
    font-size: 13px;
    font-style: italic;
  }

  .error-text { color: var(--accent); font-size: 13px; }

  /* Drop zone highlight */
  textarea.dragover { border-color: var(--accent); background: #fff8f5; }

  /* Privacy badge */
  .privacy {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    color: var(--accent2);
    border: 1px solid rgba(45,106,79,0.25);
    background: rgba(45,106,79,0.06);
    padding: 5px 10px;
    border-radius: 2px;
    width: fit-content;
  }

  /* Divider line */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 4px 0;
  }

  @media (max-width: 700px) {
    .layout { grid-template-columns: 1fr; }
    .right { border-top: 1px solid var(--border); }
  }
</style>
</head>
<body>

<div class="layout">

  <!-- LEFT: Input -->
  <div class="left">
    <div class="header">
      <div class="logo">summ<span class="logo-dot">.</span>ai</div>
      <div class="tagline">local · private · powered by ollama</div>
    </div>

    <!-- Model input -->
    <div>
      <div class="label" style="margin-bottom:6px">model</div>
      <input type="text" id="modelInput" value="llama3" placeholder="gemma3:4b" style="width:100%">
    </div>

    <!-- Mode selector -->
    <div>
      <div class="label" style="margin-bottom:6px">mode</div>
      <div class="modes">
        <button class="mode-btn active" data-mode="summarize" onclick="setMode(this)">summarize</button>
        <button class="mode-btn" data-mode="bullets" onclick="setMode(this)">key points</button>
        <button class="mode-btn" data-mode="actions" onclick="setMode(this)">actions</button>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Text input -->
    <div class="textarea-wrap">
      <div class="label">input text — or drop a .txt file</div>
      <textarea
        id="inputText"
        placeholder="Paste any text here — meeting notes, emails, articles, reports..."
        oninput="updateCount()"
      ></textarea>
      <div class="input-footer">
        <div style="display:flex; gap:8px; align-items:center;">
          <span class="char-count" id="charCount">0 chars</span>
          <button class="btn-example" onclick="loadExample()">load example</button>
        </div>
        <button class="btn-run" id="runBtn" onclick="run()">analyze →</button>
      </div>
    </div>

    <div class="privacy">🔒 zero data leaves your machine</div>
  </div>

  <!-- RIGHT: Output -->
  <div class="right">
    <div class="output-header">
      <div class="label">output</div>
      <div class="output-label-row">
        <div class="thinking-dots" id="thinkingDots">
          <span></span><span></span><span></span>
        </div>
        <button class="btn-copy" onclick="copyOutput()">copy</button>
      </div>
    </div>

    <div class="output-box" id="outputBox">
      <span class="placeholder-text">Your summary will appear here...</span>
    </div>
  </div>

</div>

<script>
  let currentMode = "summarize";

  const EXAMPLE = `Team Sync — March 8th

Attendees: Sarah (PM), Dev (Engineering), Priya (Design), Tom (Sales)

Sarah noted Q1 targets are at 67% completion with 3 weeks left. The auth bug affecting ~200 users has been patched and ships Thursday. Priya's new onboarding mockups were well received — the 3-step flow is cleaner — but Tom flagged that two enterprise clients (Acme Corp, BlueStone, ~$240k ARR) are blocked on SSO before upgrading.

Decisions made:
- SSO prioritized for April sprint (~3 weeks, Dev confirmed)
- Marketing email goes Friday post-patch
- Priya delivers final mockups by Wednesday EOD

Next sync: March 15.`;

  function setMode(btn) {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentMode = btn.dataset.mode;
  }

  function updateCount() {
    const len = document.getElementById('inputText').value.length;
    document.getElementById('charCount').textContent = `${len.toLocaleString()} chars`;
  }

  function loadExample() {
    document.getElementById('inputText').value = EXAMPLE;
    updateCount();
  }

  function copyOutput() {
    const text = document.getElementById('outputBox').innerText;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.querySelector('.btn-copy');
      btn.textContent = 'copied!';
      setTimeout(() => btn.textContent = 'copy', 1500);
    });
  }

  // Drag & drop .txt files
  const ta = document.getElementById('inputText');
  ta.addEventListener('dragover', e => { e.preventDefault(); ta.classList.add('dragover'); });
  ta.addEventListener('dragleave', () => ta.classList.remove('dragover'));
  ta.addEventListener('drop', e => {
    e.preventDefault();
    ta.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file) {
      new FileReader().onload = ev => { ta.value = ev.target.result; updateCount(); };
      new FileReader().readAsText(file); // fix below
      const reader = new FileReader();
      reader.onload = ev => { ta.value = ev.target.result; updateCount(); };
      reader.readAsText(file);
    }
  });

  async function run() {
    const text = document.getElementById('inputText').value.trim();
    const model = document.getElementById('modelInput').value.trim() || 'llama3';
    if (!text) return;

    const box = document.getElementById('outputBox');
    const btn = document.getElementById('runBtn');
    const dots = document.getElementById('thinkingDots');

    box.textContent = '';
    box.className = 'output-box streaming';
    btn.disabled = true;
    btn.textContent = 'running...';
    dots.classList.add('visible');

    const form = new FormData();
    form.append('text', text);
    form.append('model', model);
    form.append('mode', currentMode);

    try {
      const res = await fetch('/summarize', { method: 'POST', body: form });
      const reader = res.body.getReader();
      const decoder = new TextDecoder();

      dots.classList.remove('visible');

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        const lines = decoder.decode(value).split('\n').filter(l => l.startsWith('data: '));
        for (const line of lines) {
          const data = line.slice(6);
          if (data === '[DONE]') break;
          if (data.startsWith('[ERROR]')) {
            box.className = 'output-box';
            box.innerHTML = `<span class="error-text">${data}</span>`;
            break;
          }
          try { box.textContent += JSON.parse(data); } catch {}
        }
      }
    } catch (err) {
      box.innerHTML = `<span class="error-text">Could not connect to Flask server.</span>`;
    } finally {
      box.className = 'output-box';
      btn.disabled = false;
      btn.textContent = 'analyze →';
      dots.classList.remove('visible');
    }
  }
</script>

</body>
</html>
