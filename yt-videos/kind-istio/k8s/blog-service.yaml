apiVersion: apps/v1
kind: Deployment
metadata:
  name: blog-service-v1
  namespace: devops-avenue
  labels:
    app: blog-service
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: blog-service
      version: v1
  template:
    metadata:
      labels:
        app: blog-service
        version: v1
    spec:
      containers:
      - name: blog-service
        image: devopsavenue/blog-service:v1
        ports:
        - containerPort: 5004
          name: http
        env:
        - name: PORT
          value: "5004"
        - name: VERSION
          value: "v1"
        - name: USER_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: USER_SERVICE_URL
        - name: ANALYTICS_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: ANALYTICS_SERVICE_URL
        livenessProbe:
          httpGet:
            path: /health
            port: 5004
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 5004
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: blog-service
  namespace: devops-avenue
  labels:
    app: blog-service
spec:
  type: ClusterIP
  ports:
  - port: 5004
    targetPort: 5004
    protocol: TCP
    name: http
  selector:
    app: blog-service