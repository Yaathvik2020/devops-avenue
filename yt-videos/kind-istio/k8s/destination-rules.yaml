---
# Retry policy for blog-service
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: blog-service-retry
  namespace: devops-avenue
spec:
  host: blog-service
  trafficPolicy:
    retries:
      attempts: 3
      perTryTimeout: 2s
      retryOn: 5xx,reset,connect-failure
