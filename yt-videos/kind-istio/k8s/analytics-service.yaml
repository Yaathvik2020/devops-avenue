apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
  namespace: devops-avenue
  labels:
    app: analytics-service
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: analytics-service
  template:
    metadata:
      labels:
        app: analytics-service
        version: v1
    spec:
      containers:
      - name: analytics-service
        image: devopsavenue/analytics-service:v1
        ports:
        - containerPort: 5007
          name: http
        env:
        - name: PORT
          value: "5007"
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-service
  namespace: devops-avenue
  labels:
    app: analytics-service
spec:
  type: ClusterIP
  ports:
  - port: 5007
    targetPort: 5007
    protocol: TCP
    name: http
  selector:
    app: analytics-service
